services:
  app:
    build: .
    environment:
      - OKR_DB_PATH=/data/okr.db
      - COMPANY_NAME=${COMPANY_NAME:-Company}
    volumes:
      - ./data:/data
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - app
    restart: unless-stopped
