services:
  app:
    build: .
    environment:
      - OKR_DB_PATH=/data/okr.db
      - COMPANY_NAME=${COMPANY_NAME:-Company}
      - APP_HOST=${APP_HOST:-http://localhost:5000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./data:/data
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - app
    restart: unless-stopped

  app-test:
    build: .
    profiles: ["test"]
    environment:
      - OKR_DB_PATH=/tmp/test.db
      - SECRET_KEY=test-secret-fixed-key-for-e2e
      - COMPANY_NAME=TestCorp
      - APP_HOST=http://app-test:5000
    expose:
      - "5000"

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["test"]
    depends_on:
      - app-test
    environment:
      - BASE_URL=http://app-test:5000
    volumes:
      - ./tests:/app/tests
      - ./test-results:/app/test-results
    command: pytest tests/ -v --tb=line --maxfail=0 --screenshot=only-on-failure --tracing=retain-on-failure --html=test-results/report.html --self-contained-html
